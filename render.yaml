# Render 用の設定ファイル（Blueprint デプロイ時に使用）
services:
  - type: web
    name: line-friendly-kakeibo
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: FLASK_DEBUG
        value: "False"
